name: Update Weather Data

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

# ここを追加（権限設定）
permissions:
  contents: write   # これが重要！

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # これも追加

      - name: Fetch Current Weather (Tokyo)
        env:
          API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          curl -s "https://api.openweathermap.org/data/2.5/weather?q=Tokyo,jp&appid=$API_KEY&units=metric&lang=ja" -o data/weather.json

      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update weather data"
